}

function fcFlip(){ state.fcFlipped=!state.fcFlipped; render(); }
function fcNext(){ state.fcFlipped=false; state.fcIndex++; render(); }
function fcPrev(){ state.fcFlipped=false; if(state.fcIndex>0)state.fcIndex--; render(); }

function renderQuiz(t, subtopic){
  const items = getItems(t, subtopic);
  if(!items.length) return '<p>Không có dữ liệu.</p>';
  if(state.qDone){
    const pct=Math.round(state.qScore/Math.min(10,items.length)*100);
    return `<div class="result-wrap">
      <div class="result-emoji">${pct>=80?'🏆':pct>=60?'😊':'💪'}</div>
      <div class="result-score">${state.qScore}/${Math.min(10,items.length)}</div>
      <div class="result-msg">${pct>=80?'Xuất sắc! Bạn đã nắm vững chủ đề này.':pct>=60?'Khá tốt! Hãy ôn lại các câu sai.':'Tiếp tục cố gắng! Ôn lại từ đầu nhé.'}</div>
      <div style="margin-top:20px;display:flex;gap:10px;justify-content:center">
        <button class="btn btn-gold" onclick="resetQuiz()">🔄 Làm lại</button>
      </div>
    </div>`;
  }
  
  const total=Math.min(10,items.length);
  const i=state.qIndex;
  const item=items[i%items.length];
  const isWord=subtopic==='words'||!subtopic;
  const isPV=subtopic==='phrasal';
  
  // Generate 4 options
  let question='', correctAns='', wrongPool=[];
  if(isWord){
    question=`Nghĩa của "<strong style="color:var(--sky)">${item.w}</strong>" (${item.type}) là gì?`;
    correctAns=item.vi;
    wrongPool=items.filter((_,idx)=>idx!==i%items.length).map(w=>w.vi);
  } else if(isPV){
    question=`Phrasal verb "<strong style="color:var(--sky)">${item.pv}</strong>" có nghĩa là gì?`;
    correctAns=item.vi;
    wrongPool=items.filter((_,idx)=>idx!==i%items.length).map(w=>w.vi);
  } else {
    question=`Idiom "<strong style="color:var(--violet)">${item.id}</strong>" có nghĩa là gì?`;
    correctAns=item.vi;
    wrongPool=items.filter((_,idx)=>idx!==i%items.length).map(w=>w.vi);
  }
  
  let opts=[correctAns];
  const shuffled=[...wrongPool].sort(()=>Math.random()-.5);
  opts=opts.concat(shuffled.slice(0,3));
  opts=opts.sort(()=>Math.random()-.5);
  
  return `
    <div class="quiz-progress">
      <span class="qp-text">Câu ${i+1}/${total}</span>
      <div style="flex:1;max-width:200px"><div class="progress-bar"><div class="progress-fill" style="width:${i/total*100}%"></div></div></div>
      <span class="score-badge">⭐ ${state.qScore}</span>
    </div>
    <div class="quiz-q">${question}</div>
    <div class="quiz-options" id="qopts">
    ${opts.map((o,oi)=>`<button class="quiz-opt${state.qAnswered?(o===correctAns?' correct':(document.querySelector('.quiz-opt.wrong')&&document.querySelector('.quiz-opt.wrong').textContent===o?' wrong':'')):''}${state.qAnswered?' disabled':''}" onclick="checkQuiz(this,'${esc(o)}','${esc(correctAns)}')">${o}</button>`).join('')}
    </div>
    <div class="quiz-explain${state.qAnswered?' show':''}" id="qexplain">
      <div class="quiz-tip">💡 Đáp án đúng: ${correctAns}</div>
      ${isWord?`Ví dụ: <em>${item.ex||''}</em>`:isPV?`Ví dụ: <em>${item.ex||''}</em>`:`Ví dụ: <em>${item.ex||''}</em>`}
    </div>
    ${state.qAnswered?`<div style="margin-top:14px;text-align:right"><button class="btn btn-gold" onclick="nextQuiz(${total})">${i+1>=total?'Xem kết quả →':'Tiếp theo →'}</button></div>`:''}`;
}

function esc(s){return (s||'').replace(/'/g,"&#39;").replace(/"/g,'&quot;');}
function checkQuiz(btn,ans,correct){
  if(state.qAnswered) return;
  state.qAnswered=true;
  const isCorrect=ans===correct;
  if(isCorrect){state.qScore++;btn.classList.add('correct');}
  else{btn.classList.add('wrong');}
  document.querySelectorAll('.quiz-opt').forEach(b=>{
    b.classList.add('disabled');
    if(b.textContent.trim()===correct&&!b.classList.contains('wrong')) b.classList.add('correct');
  });
  const ex=document.getElementById('qexplain');
  if(ex) ex.classList.add('show');
  // Re-render to show next button
  render();
}
function nextQuiz(total){
  const i=state.qIndex;
  if(i+1>=total){ state.qDone=true; render(); return; }
  state.qIndex++;
  state.qAnswered=false;
  render();
}
function resetQuiz(){ state.qIndex=0;state.qAnswered=false;state.qScore=0;state.qDone=false; render(); }

function renderMatch(t, subtopic){
  const items = (getItems(t, subtopic)||[]).slice(0,8);
  if(items.length<4) return '<p>Cần ít nhất 4 từ để ghép cặp.</p>';
  const matched=state.matchPaired||{};
  const matchedCount=Object.keys(matched).length;
  const isWord=subtopic==='words'||!subtopic;
  
  if(matchedCount>=items.length){
    return `<div class="result-wrap">
      <div class="result-emoji">🎉</div>
      <div class="result-score">${items.length}/${items.length}</div>
      <div class="result-msg">Hoàn thành! Bạn đã ghép đúng tất cả các cặp.</div>
      <div style="margin-top:20px"><button class="btn btn-gold" onclick="resetMatch()">🔄 Chơi lại</button></div>
    </div>`;
  }
  
  const rights=items.map(w=>isWord?w.vi:(w.vi));
  const shuffledRights=[...rights].sort(()=>Math.random()-.5);
  const savedOrder = state.matchOrder || (state.matchOrder=[...shuffledRights]);
  
  return `
    <div style="margin-bottom:14px;display:flex;align-items:center;gap:12px">
      <span style="font-size:13px;color:var(--muted)">Ghép cặp: ${matchedCount}/${items.length} cặp đúng</span>
      <div style="flex:1;max-width:200px"><div class="progress-bar"><div class="progress-fill" style="width:${matchedCount/items.length*100}%"></div></div></div>
    </div>
    <div class="match-grid">
      <div>
        <h4>TỪ / CỤM TỪ</h4>
        ${items.map((w,i)=>{
          const wText=isWord?w.w:w.pv||w.id;
          const isMatched=!!matched[i];
          const isSel=state.matchLeft===i;
          return `<div class="match-item${isMatched?' matched':isSel?' selected':''}" id="ml${i}" onclick="${isMatched?'':''};matchLeft(${i})">${wText}</div>`;
        }).join('')}
      </div>
      <div>
        <h4>NGHĨA TIẾNG VIỆT</h4>
        ${savedOrder.map((vi,i)=>{
          const isMatched=Object.values(matched).includes(vi);
          const isSel=state.matchLeft!==null&&items[state.matchLeft]&&(isWord?items[state.matchLeft].vi===vi:items[state.matchLeft].vi===vi);
          return `<div class="match-item${isMatched?' matched':''}" id="mr${i}" onclick="${isMatched?'':''};matchRight('${esc(vi)}')">${vi}</div>`;
        }).join('')}
      </div>
    </div>
    <div style="margin-top:12px;text-align:right"><button class="btn btn-outline btn-sm" onclick="resetMatch()">↺ Sắp xếp lại</button></div>`;
}

function matchLeft(i){
  if(state.matchPaired&&state.matchPaired[i]) return;
  state.matchLeft=i;
  render();
}
function matchRight(vi){
  if(state.matchLeft===null) return;
  const items=getItems(state.topicId?VOCAB_TOPICS.find(t=>t.id===state.topicId):ADVANCED_TOPICS.find(t=>t.id===state.advTopicId), state.subtopic);
  const correct=(state.subtopic==='words'||!state.subtopic)?items[state.matchLeft].vi:items[state.matchLeft].vi;
  if(vi===correct){
    if(!state.matchPaired) state.matchPaired={};
    state.matchPaired[state.matchLeft]=vi;
    state.matchLeft=null;
    showToast('✅ Đúng rồi!');
  } else {
    showToast('❌ Chưa đúng, thử lại!');
    state.matchLeft=null;
  }
  render();
}
function resetMatch(){state.matchPaired={};state.matchLeft=null;state.matchOrder=null;render();}

  state.mkAnswered=true;
  state.selectedOpt=oi;
  const isCorrect=ans.startsWith(correct+'.')||ans===correct;
  if(isCorrect){state.mkScore++;btn.classList.add('correct');}
  else{btn.classList.add('wrong');}
  document.querySelectorAll('.mk-opt').forEach(b=>{
    b.classList.add('disabled');
    if(b.textContent.trim().startsWith(correct+'.')||b.textContent.trim()===correct){
      if(!b.classList.contains('wrong')) b.classList.add('correct');
    }
  });
  const ex=document.getElementById('mkexplain');
  if(ex) ex.classList.add('show');
  render();
}
function nextMK(){
  if(state.mkIndex+1>=MISTAKES.length){ state.mkDone=true; render(); return; }
  state.mkIndex++;
  state.mkAnswered=false;
  state.selectedOpt=null;
  render();
}
function resetMK(){state.mkIndex=0;state.mkAnswered=false;state.mkScore=0;state.mkDone=false;state.selectedOpt=null;render();}

// ═══════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1800);
}

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
render();
</script>
</body>
</html>
