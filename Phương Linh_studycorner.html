<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StarPath – Ôn thi THPTQG Tiếng Anh</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@600;700;800&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#eef2f8;--sidebar:#ffffff;--card:#ffffff;--card2:#f4f7fb;
  --border:#dde3ed;--gold:#d97706;--sky:#0284c7;--rose:#e11d48;
  --violet:#7c3aed;--green:#059669;--text:#0f172a;--muted:#64748b;
  --gold-glow:0 0 16px rgba(217,119,6,.18);
  --sky-glow:0 0 16px rgba(2,132,199,.18);
  --shadow:0 2px 12px rgba(15,23,42,.07);
  --shadow-md:0 4px 20px rgba(15,23,42,.10);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;font-size:15px;overflow:hidden}
/* ─── SCROLLBARS ─── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#f0f4f8}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#94a3b8}
/* ─── LAYOUT ─── */
#app{display:flex;height:100vh;overflow:hidden}
/* ─── SIDEBAR ─── */
#sidebar{width:225px;min-width:225px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;z-index:10;flex-shrink:0;box-shadow:2px 0 8px rgba(15,23,42,.04)}
.sb-logo{padding:22px 20px 16px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,#0f172a,#1e3a5f)}
.sb-logo h1{font-family:'Barlow Condensed',sans-serif;font-size:23px;font-weight:800;letter-spacing:1px;color:#fff}
.sb-logo h1 span{background:linear-gradient(90deg,#fbbf24,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sb-logo p{font-size:10px;color:rgba(255,255,255,.5);margin-top:3px;letter-spacing:2px;text-transform:uppercase}
.sb-user{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--border);background:#fafbfd}
.sb-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#f59e0b,#e11d48);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;flex-shrink:0;box-shadow:0 2px 8px rgba(245,158,11,.3)}
.sb-username{font-size:13px;font-weight:600;line-height:1.2;color:var(--text)}
.sb-role{font-size:11px;color:var(--muted)}
.sb-nav{padding:12px 10px;flex:1}
.nav-section{font-size:10px;letter-spacing:2px;color:#94a3b8;text-transform:uppercase;padding:8px 10px 4px;font-weight:700}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;transition:all .2s;font-size:13.5px;font-weight:500;color:var(--muted);margin-bottom:2px;border:1px solid transparent}
.nav-item:hover{background:#f0f5ff;color:var(--sky)}
.nav-item.active{background:linear-gradient(135deg,#eff6ff,#e0f2fe);color:var(--sky);border-color:#bfdbfe;font-weight:600}
.nav-item .ni{width:18px;text-align:center;font-size:15px}
.nav-item .nb{font-size:11px;background:var(--rose);color:#fff;padding:1px 6px;border-radius:10px;margin-left:auto;font-weight:700}
/* ─── MAIN ─── */
#main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
/* ─── TOP BAR ─── */
.topbar{padding:13px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);position:sticky;top:0;z-index:5;flex-shrink:0;box-shadow:0 1px 4px rgba(15,23,42,.06)}
.topbar-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;letter-spacing:.5px;color:var(--text)}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
.breadcrumb span{color:var(--muted)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-family:'Barlow',sans-serif;font-weight:600;font-size:13px;transition:all .2s;text-decoration:none}
.btn-gold{background:var(--gold);color:#fff}
.btn-gold:hover{background:#b45309;box-shadow:var(--gold-glow)}
.btn-outline{background:#fff;border:1.5px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--sky);color:var(--sky)}
.btn-sky{background:#e0f2fe;border:1.5px solid #bae6fd;color:var(--sky)}
.btn-sky:hover{background:#bae6fd}
.btn-rose{background:#fff0f3;border:1.5px solid #fecdd3;color:var(--rose)}
.btn-violet{background:#f5f3ff;border:1.5px solid #ddd6fe;color:var(--violet)}
.btn-green{background:#ecfdf5;border:1.5px solid #a7f3d0;color:var(--green)}
.btn-sm{padding:5px 12px;font-size:12px}
/* ─── PAGE CONTENT ─── */
#page{flex:1;padding:24px 28px;overflow-y:auto}
/* ─── HERO ─── */
.hero{background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 50%,#0c4a6e 100%);border-radius:18px;padding:30px 34px;margin-bottom:24px;position:relative;overflow:hidden;box-shadow:var(--shadow-md)}
.hero::before{content:'';position:absolute;top:-60px;right:-60px;width:260px;height:260px;background:radial-gradient(circle,rgba(251,191,36,.2),transparent 70%);pointer-events:none}
.hero::after{content:'';position:absolute;bottom:-40px;left:-20px;width:200px;height:200px;background:radial-gradient(circle,rgba(96,165,250,.15),transparent 70%);pointer-events:none}
.hero h2{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:700;margin-bottom:6px;color:#fff}
.hero h2 span{color:#fbbf24}
.hero p{color:rgba(255,255,255,.65);font-size:14px;max-width:500px}
.hero-stats{display:flex;gap:24px;margin-top:20px}
.stat-item{text-align:center}
.stat-num{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:700;color:#60a5fa}
.stat-lbl{font-size:11px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:1px}
/* ─── GRID ─── */
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
/* ─── CARDS ─── */
.card{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:20px;transition:all .22s;cursor:pointer;box-shadow:var(--shadow)}
.card:hover{border-color:#93c5fd;transform:translateY(-3px);box-shadow:0 10px 28px rgba(2,132,199,.12)}
.card-icon{font-size:28px;margin-bottom:10px}
.card-title{font-weight:700;font-size:15px;margin-bottom:4px;color:var(--text)}
.card-sub{font-size:12px;color:var(--muted)}
.card-count{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 8px;border-radius:6px;margin-top:8px;font-weight:600}
.cc-gold{background:#fef3c7;color:#92400e}
.cc-sky{background:#e0f2fe;color:#0369a1}
.cc-rose{background:#fff0f3;color:#be123c}
.cc-violet{background:#f5f3ff;color:#6d28d9}
.cc-green{background:#ecfdf5;color:#047857}
/* ─── SECTION HEADER ─── */
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-hdr h3{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:700;letter-spacing:.5px;color:var(--text)}
/* ─── SPEAK BUTTON ─── */
.speak-btn{background:none;border:none;cursor:pointer;font-size:15px;padding:3px 5px;border-radius:6px;transition:all .15s;color:var(--muted);line-height:1;vertical-align:middle}
.speak-btn:hover{background:#e0f2fe;color:var(--sky);transform:scale(1.1)}
.speak-btn.speaking{color:var(--sky);animation:pulse .6s infinite alternate}
@keyframes pulse{from{transform:scale(1)}to{transform:scale(1.2)}}
/* ─── WORD TABLE ─── */
.word-table{width:100%;border-collapse:separate;border-spacing:0 5px}
.word-table th{font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);padding:8px 12px;text-align:left;font-weight:700;background:transparent}
.word-row{background:var(--card);cursor:default;transition:all .18s;box-shadow:0 1px 4px rgba(15,23,42,.05)}
.word-row:hover{box-shadow:0 4px 14px rgba(2,132,199,.1);transform:translateX(2px)}
.word-row td{padding:11px 12px;font-size:13.5px;border-top:1.5px solid var(--border);border-bottom:1.5px solid var(--border)}
.word-row td:first-child{border-left:1.5px solid var(--border);border-radius:10px 0 0 10px;border-left-color:#bfdbfe}
.word-row td:last-child{border-right:1.5px solid var(--border);border-radius:0 10px 10px 0}
.word-text{font-weight:700;color:#0369a1;font-size:14px}
.word-pron{font-size:11px;color:#7c3aed;margin-top:2px;font-family:'Courier New',monospace;font-style:italic}
.word-type{font-size:10px;padding:2px 7px;border-radius:5px;background:#f5f3ff;color:#7c3aed;font-weight:700}
.word-syn{font-size:11px;color:#047857;font-style:italic}
.word-ant{font-size:11px;color:#be123c;font-style:italic}
/* ─── PROGRESS BAR ─── */
.progress-bar{height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--sky),#7c3aed);border-radius:3px;transition:width .5s}
/* ─── STUDY MODES ─── */
.mode-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.study-wrap{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:center}
/* FLASHCARD */
.flashcard-wrap{width:100%;max-width:560px;perspective:1000px;margin:0 auto}
.flashcard{width:100%;height:240px;position:relative;transform-style:preserve-3d;transition:transform .5s;cursor:pointer;margin-bottom:20px}
.flashcard.flipped{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;border:2px solid}
.fc-front{background:linear-gradient(135deg,#0f172a,#1e3a5f);border-color:#334155;box-shadow:var(--shadow-md)}
.fc-back{background:linear-gradient(135deg,#fffbeb,#fef3c7);border-color:#fcd34d;box-shadow:var(--shadow-md);transform:rotateY(180deg)}
.fc-word{font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:700;color:#60a5fa}
.fc-pron{font-size:14px;color:#94a3b8;margin-top:6px;font-family:'Courier New',monospace;font-style:italic}
.fc-type{font-size:12px;padding:3px 10px;border-radius:6px;background:rgba(167,139,250,.2);color:#c4b5fd;margin-top:10px}
.fc-meaning{font-size:22px;font-weight:700;color:#92400e}
.fc-example{font-size:13px;color:#78716c;margin-top:10px;font-style:italic;max-width:380px}
.fc-hint{font-size:12px;color:rgba(255,255,255,.35);margin-top:16px}
.fc-speak{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:13px;margin-top:12px;transition:all .2s;font-family:'Barlow',sans-serif}
.fc-speak:hover{background:rgba(255,255,255,.22)}
.fc-nav{display:flex;align-items:center;gap:16px;justify-content:center}
.fc-counter{font-size:13px;color:var(--muted);font-weight:600}
/* QUIZ */
.quiz-q{background:linear-gradient(135deg,#f0f9ff,#e0f2fe);border:2px solid #bae6fd;border-radius:14px;padding:22px 24px;margin-bottom:16px;font-size:15px;font-weight:600;line-height:1.7;color:var(--text)}
.quiz-options{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.quiz-opt{background:#fff;border:2px solid var(--border);border-radius:10px;padding:13px 16px;cursor:pointer;transition:all .2s;font-size:13.5px;text-align:left;font-family:'Barlow',sans-serif;color:var(--text);box-shadow:0 1px 4px rgba(15,23,42,.05)}
.quiz-opt:hover:not(.disabled){border-color:var(--sky);background:#f0f9ff;color:var(--sky)}
.quiz-opt.correct{border-color:#059669;background:#ecfdf5;color:#047857;font-weight:700}
.quiz-opt.wrong{border-color:#e11d48;background:#fff0f3;color:#be123c}
.quiz-opt.disabled{cursor:default;pointer-events:none}
.quiz-explain{background:linear-gradient(135deg,#fffbeb,#fef3c7);border:2px solid #fcd34d;border-radius:12px;padding:16px;font-size:13px;line-height:1.8;margin-top:12px;display:none;color:#78350f}
.quiz-explain.show{display:block}
.quiz-tip{color:#92400e;font-weight:700;display:flex;gap:6px;margin-bottom:6px}
.quiz-progress{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.qp-text{font-size:13px;color:var(--muted);font-weight:600}
.score-badge{background:linear-gradient(135deg,var(--gold),#fbbf24);color:#fff;padding:4px 12px;border-radius:20px;font-weight:700;font-size:14px;box-shadow:0 2px 8px rgba(217,119,6,.3)}
/* MATCHING */
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.match-col h4{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;font-weight:700}
.match-item{background:#fff;border:2px solid var(--border);border-radius:10px;padding:11px 14px;cursor:pointer;transition:all .2s;font-size:13px;margin-bottom:8px;min-height:42px;display:flex;align-items:center;box-shadow:0 1px 4px rgba(15,23,42,.05)}
.match-item:hover{border-color:var(--sky)}
.match-item.selected{border-color:var(--gold);background:#fffbeb;color:#92400e;font-weight:600}
.match-item.matched{border-color:var(--green);background:#ecfdf5;color:#047857;cursor:default;font-weight:600}
.match-item.wrong-match{border-color:var(--rose);background:#fff0f3;animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
/* GRAMMAR */
.grammar-card{background:#fff;border:1.5px solid var(--border);border-radius:14px;padding:18px 22px;margin-bottom:12px;cursor:pointer;transition:all .2s;box-shadow:var(--shadow)}
.grammar-card:hover{border-color:#93c5fd;box-shadow:0 4px 16px rgba(2,132,199,.1)}
.grammar-card.open .gc-body{display:block}
.gc-header{display:flex;align-items:center;justify-content:space-between;font-weight:700;font-size:15px;color:var(--text)}
.gc-tag{font-size:10px;padding:2px 8px;border-radius:5px;background:#e0f2fe;color:#0369a1;font-weight:700}
.gc-body{display:none;margin-top:16px;font-size:13.5px;line-height:1.85;color:#334155;border-top:1.5px dashed #e2e8f0;padding-top:14px}
.gc-body h4{color:#0369a1;font-size:12px;text-transform:uppercase;letter-spacing:1.2px;margin:14px 0 7px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700}
.gc-body .rule-box{background:#f0f9ff;border-left:4px solid #0284c7;padding:10px 14px;border-radius:0 10px 10px 0;margin:8px 0;font-size:13px;color:#0c4a6e}
.gc-body .example-box{background:#fffbeb;border-left:4px solid #d97706;padding:10px 14px;border-radius:0 10px 10px 0;margin:8px 0;font-size:13px;color:#78350f}
.gc-body .tip-box{background:#fff0f3;border-left:4px solid #e11d48;padding:10px 14px;border-radius:0 10px 10px 0;margin:8px 0;font-size:13px;color:#881337}
.gc-body code{background:#f5f3ff;color:#6d28d9;padding:1px 6px;border-radius:4px;font-family:monospace;font-size:12px;border:1px solid #ddd6fe}
/* MISTAKES */
.mistake-card{background:#fff;border:1.5px solid var(--border);border-radius:14px;padding:20px;margin-bottom:14px;box-shadow:var(--shadow)}
.mk-num{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.mk-q{font-size:14px;line-height:1.8;margin-bottom:14px;color:var(--text)}
.mk-q u{color:#0284c7;text-decoration:underline wavy #0284c7;text-underline-offset:3px}
.mk-q em{color:#d97706;font-style:italic;font-weight:600}
.mk-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.mk-opt{background:#fafbfd;border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;cursor:pointer;font-size:13px;text-align:left;font-family:'Barlow',sans-serif;color:var(--text);transition:all .2s;box-shadow:0 1px 3px rgba(15,23,42,.04)}
.mk-opt:hover:not(.disabled){border-color:var(--sky);background:#f0f9ff}
.mk-opt.correct{border-color:#059669;background:#ecfdf5;color:#047857;font-weight:700}
.mk-opt.wrong{border-color:#e11d48;background:#fff0f3;color:#be123c}
.mk-opt.disabled{cursor:default;pointer-events:none}
.mk-explain{display:none;margin-top:14px;background:#fffbeb;border:1.5px solid #fcd34d;border-radius:12px;padding:18px;font-size:13px;line-height:1.85;color:#78350f}
.mk-explain.show{display:block}
.mk-explain-hdr{display:flex;align-items:center;gap:6px;font-weight:700;color:#92400e;margin-bottom:8px;font-size:14px}
.mk-tip-hdr{display:flex;align-items:center;gap:6px;font-weight:700;color:#0369a1;margin:12px 0 6px;font-size:14px}
/* QUOTES */
.quote-footer{background:linear-gradient(135deg,#fef3c7,#fff7ed);border:2px solid #fcd34d;border-radius:14px;padding:20px 28px;margin-top:28px;margin-bottom:10px;text-align:center;box-shadow:0 2px 12px rgba(217,119,6,.1)}
.quote-text{font-family:'Playfair Display',serif;font-size:16px;color:#78350f;font-style:italic;line-height:1.7}
.quote-text::before{content:'"';color:#d97706;font-size:26px;line-height:0;vertical-align:-10px;margin-right:4px}
.quote-text::after{content:'"';color:#d97706;font-size:26px;line-height:0;vertical-align:-10px;margin-left:4px}
/* TABS */
.tabs{display:flex;gap:4px;background:#f1f5f9;border-radius:12px;padding:4px;margin-bottom:20px;width:fit-content;border:1.5px solid var(--border)}
.tab{padding:7px 16px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);transition:all .2s}
.tab.active{background:#fff;color:var(--sky);box-shadow:0 2px 8px rgba(15,23,42,.1)}
/* SEARCH */
.search-bar{position:relative;margin-bottom:16px}
.search-bar input{width:100%;background:#fff;border:2px solid var(--border);border-radius:12px;padding:10px 14px 10px 40px;color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;outline:none;transition:border-color .2s;box-shadow:var(--shadow)}
.search-bar input:focus{border-color:var(--sky);box-shadow:0 0 0 3px rgba(2,132,199,.1)}
.search-bar input::placeholder{color:var(--muted)}
.search-bar::before{content:'🔍';position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none}
/* TAG PILLS */
.tag-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.tag{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid;transition:all .2s}
.tag.gold{border-color:#fcd34d;color:#92400e;background:#fffbeb}
.tag.gold.active,.tag.gold:hover{background:var(--gold);color:#fff;border-color:var(--gold)}
/* RESULTS SCREEN */
.result-wrap{text-align:center;padding:40px}
.result-emoji{font-size:64px;margin-bottom:16px;filter:drop-shadow(0 4px 8px rgba(0,0,0,.15))}
.result-score{font-family:'Barlow Condensed',sans-serif;font-size:60px;font-weight:800;color:var(--sky)}
.result-msg{color:var(--muted);font-size:15px;margin-top:8px}
/* TOAST */
#toast{position:fixed;bottom:24px;right:24px;background:#fff;border:2px solid #059669;border-radius:12px;padding:12px 18px;font-size:13px;color:#047857;z-index:100;opacity:0;transition:opacity .3s;pointer-events:none;font-weight:600;box-shadow:0 4px 16px rgba(5,150,105,.2)}
#toast.show{opacity:1}
/* BACK BTN */
.back-btn{display:inline-flex;align-items:center;gap:6px;color:var(--muted);cursor:pointer;font-size:13px;font-weight:700;padding:7px 14px;margin-bottom:16px;transition:all .2s;background:#fff;border:1.5px solid var(--border);border-radius:8px;font-family:'Barlow',sans-serif}
.back-btn:hover{color:var(--sky);border-color:#93c5fd;background:#f0f9ff}
/* ANIMATE */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .28s ease forwards}
/* IDIOM TABLE */
.idiom-row .idiom-text{color:#6d28d9;font-weight:700}
/* RESPONSIVE */
@media(max-width:768px){
  #sidebar{width:185px;min-width:185px}
  .grid-3,.grid-4{grid-template-columns:repeat(2,1fr)}
  .quiz-options,.mk-opts{grid-template-columns:1fr}
}
</style>
</head>

//  SPEECH SYNTHESIS

let currentUtt = null;
function speak(text, btn) {
  if (!('speechSynthesis' in window)) { showToast('Trình duyệt chưa hỗ trợ đọc audio.'); return; }
  // Cancel if same word is speaking
  if (currentUtt && window.speechSynthesis.speaking) {
    window.speechSynthesis.cancel();
    document.querySelectorAll('.speak-btn').forEach(b=>b.classList.remove('speaking'));
    currentUtt = null;
    return;
  }
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'en-US';
  utter.rate = 0.82;
  utter.pitch = 1.05;
  // Try to pick a natural English voice
  const voices = window.speechSynthesis.getVoices();
  const preferred = voices.find(v => v.lang === 'en-US' && (v.name.includes('Samantha') || v.name.includes('Google') || v.name.includes('Karen') || v.name.includes('Alex')))
                 || voices.find(v => v.lang.startsWith('en'));
  if (preferred) utter.voice = preferred;
  if (btn) { btn.classList.add('speaking'); currentUtt = utter; }
  utter.onend = () => { document.querySelectorAll('.speak-btn').forEach(b=>b.classList.remove('speaking')); currentUtt = null; };
  utter.onerror = () => { document.querySelectorAll('.speak-btn').forEach(b=>b.classList.remove('speaking')); currentUtt = null; };
  window.speechSynthesis.speak(utter);
}
// Preload voices
if ('speechSynthesis' in window) { window.speechSynthesis.getVoices(); window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices(); }

const GRAMMAR_TOPICS = [
  {id:'g1',title:'Thì Động Từ (Verb Tenses)',tag:'GRAMMAR',
   content:`
<h4>HTĐ vs HTTD (Present Simple vs Present Continuous)</h4>
<div class="rule-box"><strong>Hiện tại đơn (HTĐ):</strong> sự thật, thói quen, lịch trình cố định<br>→ Dấu hiệu: <code>always, usually, often, sometimes, rarely, never, every..., on Mondays</code></div>
<div class="rule-box"><strong>Hiện tại tiếp diễn (HTTD):</strong> hành động đang xảy ra lúc nói, hoặc xu hướng tạm thời<br>→ Dấu hiệu: <code>now, at the moment, at present, currently, these days, still, look!, listen!</code></div>
<div class="example-box">She usually <em>cycles</em> to work, but this week she <em>is taking</em> the bus because her bike broke down.</div>
<div class="tip-box">⚠️ <strong>Stative verbs KHÔNG dùng HTTD:</strong> know, believe, love, hate, want, need, seem, understand, contain, belong...<br>❌ <em>I am knowing the answer.</em> → ✅ <em>I know the answer.</em></div>

<h4>QKĐ vs HTHT (Past Simple vs Present Perfect)</h4>
<div class="rule-box"><strong>Quá khứ đơn (QKĐ):</strong> hành động đã kết thúc, có mốc thời gian cụ thể trong quá khứ<br>→ <code>yesterday, ago, last..., in + năm cụ thể, when + QKĐ</code></div>
<div class="rule-box"><strong>Hiện tại hoàn thành (HTHT):</strong> hành động liên quan đến hiện tại<br>→ <code>since, for, already, yet, just, ever, never, recently, lately, so far, up to now, this week/month/year</code></div>
<div class="example-box">I <em>lost</em> my keys yesterday. (QKĐ - đã xong)<br>I <em>have lost</em> my keys. (HTHT - vẫn chưa tìm được)</div>
<div class="tip-box">💡 <strong>Mẹo "for":</strong> "for + khoảng thời gian" có thể đi với CẢ HAI thì.<br>Còn đang tiếp diễn → HTHT | Đã kết thúc → QKĐ</div>

<h4>Quá khứ hoàn thành (QKHT)</h4>
<div class="rule-box">Hai việc trong quá khứ: việc xảy ra TRƯỚC dùng QKHT (had + P2), việc xảy ra SAU dùng QKĐ.<br>→ <code>before, after, when, by the time, as soon as, already, just, never... before</code></div>
<div class="example-box">By the time the ambulance <em>arrived</em>, the patient <em>had already died</em>.<br>When I <em>got</em> to the station, the train <em>had already left</em>.</div>
<div class="tip-box">💡 <strong>Công thức nhanh:</strong> Thấy "by the time + QKĐ" → mệnh đề chính dùng QKHT.</div>

<h4>Tương lai: will / be going to / Present Continuous</h4>
<div class="rule-box"><strong>Will:</strong> quyết định tại chỗ, dự đoán không có bằng chứng<br><strong>Be going to:</strong> bằng chứng hiện tại, kế hoạch đã quyết định<br><strong>Present Continuous:</strong> đã sắp xếp cụ thể (lịch hẹn)</div>
<div class="tip-box">⚠️ <strong>Bẫy mệnh đề thời gian:</strong> Sau <code>when, before, after, as soon as, until, by the time</code> → KHÔNG dùng will, dùng HTĐ hoặc HTHT.<br>❌ <em>I will call you when I will arrive.</em> → ✅ <em>I will call you when I arrive.</em></div>
`},
  {id:'g2',title:'Câu Bị Động (Passive Voice)',tag:'GRAMMAR',
   content:`
<h4>Khi nào dùng bị động?</h4>
<div class="rule-box">(1) Không biết / không cần nói chủ thể hành động<br>(2) Muốn nhấn mạnh vào đối tượng bị tác động<br>(3) Văn phong trang trọng, khoa học, báo chí</div>

<h4>Công thức: BE + V3 (P2)</h4>
<div class="rule-box">
HTĐ: <code>are sold</code> | HTTD: <code>is being built</code> | QKĐ: <code>was stolen</code><br>
QKTD: <code>was being fixed</code> | HTHT: <code>has been cancelled</code><br>
QKHT: <code>had been finished</code> | Tương lai: <code>will be announced</code><br>
Modal: <code>must be submitted</code>
</div>
<div class="example-box">The Eiffel Tower ______ in 1889. → chủ ngữ là "vật" + năm xây dựng → <strong>was built</strong></div>

<h4>Have/Get something done</h4>
<div class="rule-box"><code>S + have/get + O + P2</code>: nhờ/thuê người khác làm việc gì cho mình</div>
<div class="example-box">She <em>had her car repaired</em> at the garage. (nhờ garage sửa xe)<br>You should <em>get your eyes checked</em>. (nên đi kiểm tra mắt)</div>
<div class="tip-box">⚠️ <strong>Đừng nhầm:</strong> "He had his wallet stolen" = bị ai đó lấy trộm ví (bị động ngoài ý muốn, KHÔNG phải nhờ ai làm).</div>
`},
  {id:'g3',title:'Câu Điều Kiện (Conditionals)',tag:'GRAMMAR',
   content:`
<h4>4 loại câu điều kiện</h4>
<div class="rule-box"><strong>Loại 0 – Luật tự nhiên:</strong> If + HTĐ, HTĐ<br><em>If you heat ice, it melts.</em></div>
<div class="rule-box"><strong>Loại 1 – Có thể xảy ra:</strong> If + HTĐ, will/can/may + V<br><em>If it doesn't rain tomorrow, we will go hiking.</em></div>
<div class="rule-box"><strong>Loại 2 – Trái thực tế hiện tại:</strong> If + QKĐ (be→were), would/could/might + V<br><em>If I were a bird, I would fly to you.</em></div>
<div class="rule-box"><strong>Loại 3 – Trái thực tế quá khứ:</strong> If + QKHT, would/could/might + have + P2<br><em>If she had set an alarm, she wouldn't have missed the flight.</em></div>

<h4>Câu điều kiện hỗn hợp (Mixed Conditionals)</h4>
<div class="example-box">If he <em>had studied</em> medicine, he <em>would be</em> a doctor now. (học y từ trước → bây giờ là bác sĩ)<br>If I <em>were</em> more careful, I <em>wouldn't have made</em> that mistake. (bản chất cẩn thận hơn → đã không mắc lỗi)</div>

<h4>Đảo ngữ câu điều kiện</h4>
<div class="rule-box">Bỏ "if", đảo trợ động từ lên trước chủ ngữ.<br><strong>Loại 1:</strong> <code>Should you need any help, please call me.</code><br><strong>Loại 2:</strong> <code>Were I in your shoes, I would refuse.</code><br><strong>Loại 3:</strong> <code>Had she known the truth, she would have reacted differently.</code></div>
<div class="tip-box">💡 Thấy "Were/Had/Should + S" ở đầu mệnh đề → đây là câu điều kiện đảo ngữ, KHÔNG phải câu hỏi.</div>
`},
  {id:'g4',title:'Mệnh Đề Quan Hệ (Relative Clauses)',tag:'GRAMMAR',
   content:`
<h4>Xác định vs Không xác định</h4>
<div class="rule-box"><strong>Xác định (Defining):</strong> Không có dấu phẩy. Thông tin cần thiết để xác định danh từ. Có thể dùng <code>that, who, which, whose, whom</code>.<br><em>The boy who sits next to me is Tom.</em></div>
<div class="rule-box"><strong>Không xác định (Non-defining):</strong> Có dấu phẩy. Thông tin bổ sung, bỏ đi vẫn hiểu. KHÔNG dùng "that". Chỉ dùng <code>who, which, whose, whom</code>.<br><em>My brother, who lives in HCM, is a doctor.</em></div>
<div class="tip-box">⚠️ Thấy dấu phẩy trước đại từ quan hệ → KHÔNG được dùng "that".<br>❌ <em>Ha Noi, that is the capital, is beautiful.</em> → ✅ <em>Ha Noi, which is the capital, is beautiful.</em></div>

<h4>Where / When / Why trong mệnh đề quan hệ</h4>
<div class="rule-box"><code>Where</code> = in/at/on which (thay cho nơi chốn): <em>the city where I was born</em><br><code>When</code> = at/in/on which (thay cho thời gian): <em>the year when I graduated</em><br><code>Why</code> = for which (thay cho lý do): <em>the reason why he left</em></div>

<h4>Rút gọn mệnh đề quan hệ</h4>
<div class="rule-box"><strong>Chủ động</strong> → V-ing: <em>The woman standing over there.</em><br><strong>Bị động</strong> → P2 (V3): <em>The bridge built in 1990.</em><br><strong>Thứ tự/khả năng</strong> → to-V: <em>She was the first person to arrive.</em></div>
<div class="tip-box">💡 Nếu danh từ trước là CHỦ THỂ hành động → V-ing. Nếu là ĐỐI TƯỢNG bị tác động → P2.<br>"a barking dog" (chủ thể) | "a broken window" (đối tượng)</div>
`},
  {id:'g5',title:'Liên Từ & Giới Từ (Conjunctions & Prepositions)',tag:'GRAMMAR',
   content:`
<h4>Although / Despite / In spite of</h4>
<div class="rule-box"><code>Although / though / even though + S + V</code> (mệnh đề đầy đủ)<br><code>Despite / In spite of + N / V-ing / the fact that + S + V</code></div>
<div class="example-box">Although it was raining heavily, we continued our journey.<br>Despite the heavy rain, we continued our journey.<br>In spite of feeling tired, she kept working.</div>
<div class="tip-box">⚠️ <em>Despite he worked hard, he failed.</em> → SAI! Phải thêm "the fact that" hoặc đổi thành "Although".</div>

<h4>Because / Because of / Due to / Owing to</h4>
<div class="rule-box"><code>Because + S + V</code><br><code>Because of / Due to / Owing to + N / V-ing</code></div>
<div class="example-box">Because the weather was bad, the flight was delayed.<br>Because of / Due to / Owing to bad weather, the flight was delayed.</div>

<h4>So that / Such...that / So...that</h4>
<div class="rule-box"><code>so + adj/adv + that</code>: đến mức mà (chỉ kết quả)<br><code>such + (a/an) + adj + N + that</code>: đến mức mà (có danh từ)<br><code>so that / in order that + S + can/will + V</code>: để (chỉ mục đích)</div>
<div class="tip-box">⚠️ "so + adj" (so beautiful) | "such + (a/an) + adj + N" (such a beautiful girl | such beautiful weather)<br>❌ <em>such a so good idea</em> → chỉ dùng MỘT trong hai.</div>
`},
  {id:'g6',title:'Wish (3 loại)',tag:'GRAMMAR',
   content:`
<div class="rule-box"><strong>Ước HT (trái thực tế hiện tại):</strong> wish + QKĐ<br><em>I wish I spoke French.</em> (thực tế: không biết)<br><em>She wishes she were taller.</em> (be → were với mọi ngôi)</div>
<div class="rule-box"><strong>Ước QK (hối tiếc về QK):</strong> wish + QKHT (had + P2)<br><em>I wish I had studied harder.</em> (thực tế: đã không học chăm)<br><em>He wishes he hadn't said that.</em></div>
<div class="rule-box"><strong>Ước TL (muốn ai thay đổi):</strong> wish + would + V<br><em>I wish you would stop making noise.</em> (bực bội, muốn họ dừng)</div>
<div class="tip-box">⚠️ "I wish I will..." — SAI. Wish + would, không phải will.<br>Và wish + would KHÔNG dùng cho chính chủ ngữ: I wish I would be → I wish I were.</div>
`},
  {id:'g7',title:'Gerund vs To-infinitive (Đổi nghĩa)',tag:'GRAMMAR',
   content:`
<div class="rule-box"><strong>remember + V-ing</strong>: nhớ lại đã làm gì (việc đã xảy ra)<br><em>I remember meeting her at the party.</em></div>
<div class="rule-box"><strong>remember + to-V</strong>: nhớ (để) làm gì (việc sẽ/cần làm)<br><em>Remember to lock the door when you leave.</em></div>
<div class="rule-box"><strong>forget + V-ing</strong>: quên mất rằng đã làm gì<br><em>I'll never forget seeing the northern lights.</em></div>
<div class="rule-box"><strong>forget + to-V</strong>: quên mà không làm gì<br><em>She forgot to submit the form.</em></div>
<div class="rule-box"><strong>stop + V-ing</strong>: dừng hẳn việc đang làm<br><em>He stopped smoking last year.</em></div>
<div class="rule-box"><strong>stop + to-V</strong>: dừng lại ĐỂ làm việc khác<br><em>She stopped to buy some flowers.</em></div>
<div class="rule-box"><strong>try + V-ing</strong>: thử làm xem sao<br><em>Try adding some salt – it might taste better.</em></div>
<div class="rule-box"><strong>try + to-V</strong>: cố gắng làm (nhưng khó)<br><em>She tried to open the jar but couldn't.</em></div>
`},
  {id:'g8',title:'Modals (Động Từ Khuyết Thiếu)',tag:'GRAMMAR',
   content:`
<h4>Modal + have + P2 (suy luận về việc đã xảy ra)</h4>
<div class="rule-box"><strong>must have + P2</strong>: chắc chắn đã xảy ra<br><em>She must have worked all night.</em></div>
<div class="rule-box"><strong>can't / couldn't have + P2</strong>: chắc chắn đã KHÔNG xảy ra<br><em>He can't have stolen the money — he wasn't even there!</em></div>
<div class="rule-box"><strong>should have + P2</strong>: lẽ ra đã phải làm (nhưng không làm) — có hối tiếc<br><em>You should have told me earlier.</em></div>
<div class="rule-box"><strong>shouldn't have + P2</strong>: lẽ ra không nên làm (nhưng đã làm)<br><em>I shouldn't have eaten so much.</em></div>
<div class="rule-box"><strong>might/may have + P2</strong>: có thể đã xảy ra (không chắc)<br><em>She might have missed the bus.</em></div>
<div class="rule-box"><strong>needn't have + P2</strong>: đã làm nhưng thực ra không cần thiết<br><em>You needn't have brought food — we already have plenty.</em></div>
`},
  {id:'g9',title:'Đảo Ngữ (Inversion)',tag:'GRAMMAR',
   content:`
<div class="rule-box">Đảo ngữ xảy ra khi trạng từ/cụm trạng từ phủ định hoặc hạn chế đứng ĐẦU CÂU.<br><strong>Cấu trúc: Trạng từ phủ định + trợ động từ + S + V</strong></div>
<div class="rule-box"><strong>Never / Rarely / Seldom / Hardly ever + have/has/had/do/did/will/can + S + V</strong><br><em>Never have I seen such a mess.</em> (= I have never seen...)<br><em>Rarely does she complain about anything.</em></div>
<div class="rule-box"><strong>No sooner + had + S + P2 + than + S + QKĐ</strong><br><em>No sooner had I arrived than it started raining.</em></div>
<div class="rule-box"><strong>Hardly / Scarcely + had + S + P2 + when/before + S + QKĐ</strong><br><em>Hardly had she sat down when the phone rang.</em></div>
<div class="rule-box"><strong>Not only + trợ ĐT + S + V, but + S + also + V</strong><br><em>Not only did he win the race, but he also broke the record.</em></div>
<div class="rule-box"><strong>Only + trạng từ + trợ ĐT + S + V</strong><br><em>Only then did I realise my mistake.</em></div>
<div class="tip-box">💡 Thấy "Never / No sooner / Hardly / Not only / Only" ở đầu câu → đảo ngữ, trợ động từ phải đứng TRƯỚC chủ ngữ.</div>
`},

   ans:'B',
   explain:'"derives from" = bắt nguồn từ, được lấy từ → phù hợp: tài liệu có nguồn gốc từ kho lưu trữ đáng ngờ. A "compensates from" sai cấu trúc. C "demands from" sai nghĩa. D "urges from" sai cấu trúc.',
   tip:'🔑 Động từ + "from": derive from, originate from, come from, stem from → tất cả đều mang nghĩa "có nguồn gốc từ".'},
  {num:6,type:'Phrasal verb',
   q:'Engineers are sifting through anomalous sessions... to (6) ______ any lingering footholds left by the adversaries.',

   tip:'🔑 Đồng nghĩa với "root out": eradicate, eliminate, uproot, stamp out, get rid of.'},
  {num:7,type:'Ordering',
   q:'Sắp xếp văn bản về bảo vệ lao động gig: (c) as requested, roadmap... (b) gaps in accident insurance... (a) unified registry... (d) statutory definitions... (e) accountability spine.',
   opts:['A. c–b–a–d–e','B. b–c–a–e–d','C. c–a–e–b–d','D. a–c–b–d–e'],
   ans:'A',
   explain:'c (giới thiệu mục đích) → b (nêu vấn đề từ khảo sát) → a (giải pháp 1: sổ đăng ký) → d (giải pháp 2: định nghĩa pháp lý) → e (kết luận: đảm bảo trách nhiệm). Cấu trúc: Giới thiệu → Vấn đề → Giải pháp → Kết luận.',
   tip:'🔑 Văn bản hành chính: Mở đầu = bối cảnh/mục đích → Nêu vấn đề → Đề xuất giải pháp → Kết luận hành động.'},
  {num:8,type:'Ordering',
   q:'Sắp xếp đoạn đối thoại Bộ trưởng – Người lao động: (a) Minister: platforms offload risk... (b) Worker: ensure portability... (c) Minister: drafting provisions...',
   opts:['A. a–b–c','B. c–a–b','C. a–c–b','D. c–b–a'],
   ans:'A',
   explain:'a (nêu vấn đề: nền tảng không chịu rủi ro) → b (phản hồi và đề xuất: quyền lợi theo người) → c (cam kết hành động: soạn thảo quy định). Cấu trúc hội thoại: Nêu vấn đề → Đề xuất → Phản hồi.',
   tip:'🔑 Hội thoại: Xác định "Then/So/Therefore" → câu PHẢN HỒI, xác định "We\'re/I\'m" đang làm gì → câu CAM KẾT.'},
  {num:9,type:'Ordering',
   q:'Sắp xếp đoạn hội thoại về song ngữ: (a) Researcher: publication bias inflated claims... (b) Researcher: some tasks do show edges... (c) Parent: yet I keep reading... (d) Parent: so I should still raise my child bilingual? (e) Researcher: Absolutely...',
   opts:['A. a–b–c–d–e','B. b–a–c–d–e','C. a–c–b–d–e','D. b–d–a–c–e'],
   ans:'A',
   explain:'a (vấn đề thiên lệch công bố) → b (thừa nhận lợi thế nhỏ hẹp) → c ("Yet" = phụ huynh phản biện) → d (câu hỏi trực tiếp) → e (trả lời và kết luận). "Yet" sau b cho thấy c phải đứng sau b.',
   tip:'🔑 Từ nối "Yet" = tương phản → câu có "yet" phải đứng sau luận điểm mà nó phản biện.'},
  {num:12,type:'Relative clause',
   q:'...syllabi are sutured to earlier typologies, (12) ______.',
   opts:['A. which long claimed that the conjugal family were universal.',

         'C. that long claiming the conjugal family was universal.',
         'D. having long claims the conjugal family was universal.'],
   ans:'B',
   explain:'Dùng "which" (có dấu phẩy → mệnh đề không xác định). Thì QKHT "had claimed" vì hành động xảy ra trước thời điểm hiện tại. "family was" đúng (số ít). A sai "family were", C "that" sau dấu phẩy + thiếu động từ, D cấu trúc sai.',
   tip:'🔑 "family" là danh từ tập thể, trong tiếng Anh chuẩn thường được coi là số ít → dùng "was".'},
  {num:14,type:'Grammar',
   q:'...intersectional analyses, (14) ______, resist single-axis accounts of relatedness.',
   opts:['A. themselves insisting that kinship be mapped across race, class, and gender',

         'D. that themselves insisting kinship to be mapped across race, class, and gender'],
   ans:'A',
   explain:'"themselves insisting" là cụm phân từ (present participle) đúng, bổ nghĩa cho chủ ngữ. "insist that" + subjunctive mood → "be mapped" (không phải "is mapped"). B "insists" sai số, C "insisted" sai thì, D "that" thừa.',
   tip:'🔑 Sau "insist that" → subjunctive mood: động từ giữ nguyên dạng nguyên mẫu (be mapped, not is mapped). Đặc điểm văn phong học thuật.'},
  {num:16,type:'Inversion',
   q:'Seldom do entrenched canons admit such critiques; (16) ______, and even then, the transformation unfolds irregularly.',
   opts:['A. only after comparative evidence has accumulated do departments revise requirements',
         'B. only after comparative evidence accumulates did departments revise requirements',
         'C. only after comparative evidences have accumulated does departments revise requirements',
         'D. only when comparative evidence had accumulate departments revised requirements'],
   ans:'A',
   explain:'A đúng: đảo ngữ chuẩn "only after + mệnh đề + do + chủ ngữ + động từ". Hiện tại hoàn thành + hiện tại đơn cho quy luật chung. B sai thì. C "evidences" sai (không đếm được), "does departments" sai. D thiếu đảo ngữ và sai động từ.',
   tip:'🔑 Cấu trúc đảo ngữ: Only after + mệnh đề phụ + TRỢ ĐỘNG TỪ + CHỦ NGỮ + động từ chính.'},
  {num:17,type:'Connector',
   q:'Passengers increasingly pair VNeID with facial biometrics to breeze through checkpoints. (17) ______, uptake remains uneven across sites.',
   opts:['A. Nevertheless','B. Furthermore','C. Meanwhile','D. Consequently'],
   ans:'A',
   explain:'Câu đầu: xu hướng tích cực (ngày càng nhiều người dùng). Câu sau: thực tế trái ngược (mức độ áp dụng không đồng đều). → Tương phản/nhượng bộ → "Nevertheless" (tuy nhiên, mặc dù vậy).',
   tip:'🔑 Các từ nối tương phản: Nevertheless, However, Yet, Nonetheless, On the other hand, Despite this.'},
  {num:21,type:'Word form',
   q:'While early adopters extol (21) ______ gains – shorter dwell times and fewer document handoffs...',
   opts:['A. tangible','B. tangibly','C. tangibility','D. tangibles'],
   ans:'A',
   explain:'Vị trí trước danh từ "gains" → cần tính từ (adjective). "tangible" (adj) = hữu hình, rõ rệt, cụ thể. B adverb, C noun (tính hữu hình), D noun số nhiều.',
   tip:'🔑 Xác định từ loại cần điền: ___ + noun → cần adjective. ___ + verb → cần adverb.'},
  {num:22,type:'Vocabulary',
   q:'Ultimately, VNeID promises a (22) ______ for identity management that reduces friction while respecting due process.',
   opts:['A. framework','B. breakthrough','C. consensus','D. clearance'],
   ans:'B',
   explain:'"breakthrough" = đột phá (tiến bộ vượt bậc) → phù hợp với ngữ cảnh công nghệ nhận dạng mới cải tiến vượt trội. A "framework" = khuôn khổ (cũng có thể nhưng ít nhấn mạnh tính đột phá). C "consensus" = đồng thuận. D "clearance" = sự thông qua/giải phóng.',
   tip:'🔑 "breakthrough" thường dùng với: technology, research, medicine, science; nhấn mạnh sự đột phá lớn, thay đổi cục diện.'},
  {num:'25c',type:'Summary',

   tip:'🔑 Đọc kỹ các từ cực đoan trong đáp án: universally, guarantees, eliminates → thường sai trong bài đọc hiểu.'},
  {num:33,type:'NOT mentioned',
   q:'According to the passage about genetically modified mosquitoes, which of the following is NOT mentioned?',

         'B. The modified mosquitoes would reduce the ability to spread disease in Africa.',

   tip:'🔑 Dạng NOT mentioned: đọc kỹ từng đáp án và đối chiếu với bài. Đáp án sai thường rất cụ thể (con số, tên người) hoặc suy diễn quá xa.'},
  {num:31,type:'Inference',
   q:'According to paragraph 1 of the "techno-feudalism" passage, the author suggests that the term "techno-feudalism" can ______.',
   opts:['A. yield policy remedies precisely because it avoids structural inquiry',
         'B. blur analytical rigor by substituting moral denunciation for explanation',
         'C. demonstrate that platforms now operate outside capitalist dynamics',
         'D. neutralize public outrage by reframing platforms as benign intermediaries'],
   ans:'B',
   explain:'Tác giả viết: "it prescribes a politics of denunciation that risks confusing moral outrage with structural analysis" → thuật ngữ này làm mờ phân tích cấu trúc bằng sự phẫn nộ đạo đức. B diễn đạt chính xác ý này.',
   tip:'🔑 Suy luận từ bài: Tìm câu văn gốc chứa ý tương ứng. Đáp án sai thường phủ định, suy diễn quá xa, hoặc thêm ý mới.'},
  {num:5,type:'Ordering',
   q:'Sắp xếp các câu về chiến lược an ninh sinh học: (a) Yet field deployments exposed gaps: genomic surveillance lagged in peri-urban clinics, and fragmented data trusts chilled cross-border sharing when speed mattered most. (b) Policymakers framed biosecurity as a civic commons, coupling early-warning networks with transparent governance to sustain legitimacy during emergency powers. (c) A resilient strategy therefore blends rapid detection with privacy-preserving protocols and reciprocal data-sharing compacts negotiated in peacetime. (d) The blueprint began promisingly – sentinel sequencing, wastewater analytics, and public dashboards clarified risk without sensationalism. (e) Lessons learned suggest that capacity must be modular: labs, logistics, and legal authorisations should scale without sacrificing due process.',
   opts:['A. d – a – b – e – c','B. b – d – a – e – c','C. d – b – a – c – e','D. a – d – b – e – c'],
   ans:'A',
   explain:'Vai trò từng câu: (d) Mở đầu – kế hoạch ban đầu đầy hứa hẹn. (a) Tương phản – "Yet" bộc lộ lỗ hổng triển khai thực tế. (b) Phản ứng chính sách – sau khi thấy lỗ hổng, nhà hoạch định tái cấu trúc vấn đề. (e) Bài học rút ra – từ thực tế, rút ra yêu cầu năng lực mô-đun. (c) Kết luận – "therefore" dẫn đến chiến lược bền vững tổng hợp. || Tại sao B sai: b (chính sách) mở đầu mà chưa có bối cảnh kế hoạch ban đầu → thiếu mạch tự nhiên. || Tại sao C sai: b (chính sách) xuất hiện trước a (lỗ hổng) – nhưng lẽ ra phải thấy lỗ hổng rồi mới có phản ứng chính sách. || Tại sao D sai: câu "Yet..." (a) đứng đầu mà không có mệnh đề tích cực trước đó → "Yet" mất tác dụng tương phản.',
   tip:'🔑 "Yet" = tương phản → PHẢI có câu tích cực trước. "Therefore" = kết luận logic → đứng CUỐI. "Lessons learned" → trước kết luận. Cấu trúc chuẩn: Bối cảnh tích cực → Tương phản (Yet) → Phản ứng → Bài học → Kết luận (Therefore).'},
  {num:6,type:'Vocabulary',
   q:'For ______ fishermen whose livelihoods depend on the sea, survival often rests on a network of island infirmaries staffed by officers trained to operate in austere conditions.',
   opts:['A. a multitude of','B. no small number of','C. a good many','D. a host of'],
   ans:'D',
   explain:'A "a multitude of": trang trọng, nhưng thường thiên về số lượng trừu tượng hoặc vật thể (a multitude of problems, a multitude of stars) – với người thì hơi khô khan. B "no small number of": mang tính nhấn mạnh theo lối phủ định của phủ định, hơi dài dòng. C "a good many": thường dùng trong văn nói hoặc phong cách thân mật, không phù hợp văn báo chí học thuật. D "a host of": trang trọng, thường đi với danh từ chỉ NGƯỜI (a host of angels, a host of volunteers, a host of fishermen), rất tự nhiên trong văn báo chí, gợi hình ảnh cộng đồng đông đảo ấm áp. || "Fishermen" là người → "a host of" là lựa chọn kinh điển. "a multitude of fishermen" không sai nhưng kém tự nhiên hơn.',
   tip:'🔑 Bộ tứ cần phân biệt: a host of + NGƯỜI (tự nhiên nhất) | a multitude of + trừu tượng/vật thể | a good many + thân mật/văn nói | no small number of + nhấn mạnh nhưng dài dòng. Văn báo chí: "a host of local residents/fishermen/volunteers" là chuẩn mực.'},
  {num:8,type:'Verb tense',
   q:'Working through the night, the facility (8) ______ routinely to stabilise thousands of cases, from crushed hands to suspected strokes, before dawn flights can reach them.',
   opts:['A. has managed','B. manages','C. is managing','D. managed'],
   ans:'B',
   explain:'"Routinely" là trạng từ chỉ tần suất → cần thì Hiện tại đơn diễn tả hành động lặp đi lặp lại mang tính quy luật. Chủ ngữ "the facility" (số ít) → thêm -s. || A "has managed" (HTHT): nhấn mạnh kết quả hoặc trải nghiệm, KHÔNG dùng với "routinely" chỉ thói quen. || C "is managing" (HTTD): diễn tả hành động đang xảy ra tại thời điểm nói, không phải thói quen. || D "managed" (QKĐ): hành động đã xảy ra và kết thúc trong quá khứ, không phù hợp với "routinely" trong ngữ cảnh hiện tại.',
   tip:'🔑 Dấu hiệu HTĐ (thói quen/quy luật): always, usually, often, routinely, regularly, normally, every day/week. Khi thấy "routinely" → KHÔNG dùng HTHT (has managed) hay HTTD (is managing).'},
  {num:10,type:'Vocabulary',
   q:'The doctors, ______ in their duties, also shoulder the role of public-health stewards – running vaccination drives, monitoring outbreaks, and translating complex advice into plain speech over crackly radios.',
   opts:['A. steadfast','B. unflinching','C. evasive','D. skittish'],
   ans:'A',
   explain:'A "steadfast" /ˈsted.fɑːst/: kiên định, vững vàng, trung thành, không thay đổi trước khó khăn. Đồng nghĩa: resolute, unwavering, committed, dedicated, firm, loyal. Trái nghĩa: irresolute, wavering, fickle, disloyal. || B "unflinching" /ʌnˈflɪn.tʃɪŋ/: không nao núng, không chùn bước khi đối mặt với nguy hiểm hoặc đau đớn. Đồng nghĩa: determined, intrepid, fearless. Trái nghĩa: hesitant, timid. → Thích hợp cho tình huống đối mặt nguy hiểm, không phải sự tận tụy chuyên nghiệp. || C "evasive" /ɪˈveɪ.sɪv/: lảng tránh, né tránh, không trả lời thẳng. Đồng nghĩa: elusive, indirect. Trái nghĩa: direct, candid. → TRÁI nghĩa với ngữ cảnh. || D "skittish" /ˈskɪt.ɪʃ/: nhút nhát, dễ sợ hãi, bồn chồn, thất thường. Đồng nghĩa: nervous, jumpy, excitable. → TRÁI nghĩa. || Ngữ cảnh ca ngợi sự tận tâm, kiên định của bác sĩ trong điều kiện khắc nghiệt → "steadfast" tối ưu nhất.',
   tip:'🔑 steadfast ≈ dedicated, committed, loyal (nhấn mạnh SỰ TẬN TÂM BỀN BỈ). unflinching ≈ fearless, intrepid (nhấn mạnh DŨNG CẢM TRƯỚC NGUY HIỂM). Hai từ gần nghĩa nhưng khác sắc thái – ngữ cảnh "duties" → steadfast là chuẩn.'},
  {num:15,type:'Opposite meaning',
   q:'The word "combustible" in paragraph 3 is OPPOSITE in meaning to ______.',
   opts:['A. inflammable','B. placid','C. volatile','D. incendiary'],
   ans:'B',
   explain:'"combustible" (adj): dễ cháy; dễ bùng nổ (nghĩa bóng). Đồng nghĩa: flammable, inflammable, ignitable; volatile, explosive, incendiary. || A "inflammable": dễ cháy → ĐỒNG nghĩa (BẪY: tiền tố "in-" ở đây KHÔNG phải phủ định mà mang nghĩa "vào trong", giống như "inflame"). || B "placid": bình tĩnh, yên ả, không dễ bị kích động. Đồng nghĩa: calm, tranquil, serene, peaceful. → TRÁI nghĩa ✓. || C "volatile": dễ bay hơi; hay thay đổi, dễ bùng nổ (tình huống, thị trường) → ĐỒNG nghĩa. || D "incendiary": gây cháy; kích động (lời nói, hành động nhằm gây bạo loạn) → ĐỒNG nghĩa. || Nhóm đồng nghĩa: combustible = inflammable = volatile = incendiary. Chỉ "placid" là trái nghĩa.',
   tip:'🔑 BẪY KINH ĐIỂN của đề thi: "inflammable" ≠ "non-flammable". Cả "flammable" lẫn "inflammable" đều có nghĩa "dễ cháy". Khi thấy A,C,D cùng nhóm nghĩa → đáp án là B (từ còn lại). Mẹo: combustible, volatile, incendiary, inflammatory đều cùng trường nghĩa "bùng nổ/kích động".'},
  {num:17,type:'TRUE/FALSE',
   q:'Which of the following is TRUE according to paragraph 4 (about platform design and deliberation)?',
   opts:['A. Platform design influences exposure by shaping not only recommendations but also user frictions that structure deliberation and sharing.','B. Polarization inevitably intensifies as platforms increase cross-cutting prompts and slow down virality through tempo controls.','C. Institutional responsibility has waned because regulatory climates preclude platforms from altering their interfaces.','D. Exposure patterns derive exclusively from predictive models of preference and are unaffected by reporting tools.'],
   ans:'A',
   explain:'Câu gốc đoạn 4: "platforms shape exposure not merely by predicting preference but by designing the frictions that enable deliberation – reporting tools, cross-cutting prompts, and tempo controls for virality." || A: Diễn đạt chính xác ý này: không chỉ dự đoán sở thích mà còn thiết kế "frictions" → ✓. || B: "inevitably intensifies" – bài nói "Whether this... remains an empirical question" (vẫn là câu hỏi thực nghiệm, chưa kết luận) → SAI vì từ "inevitably". || C: Bài bắt đầu bằng "urges a re-centering of institutional responsibility" (kêu gọi tái tập trung), không phải suy yếu → SAI. || D: "exclusively from predictive models... unaffected by reporting tools" – bài nói ngược lại: còn có reporting tools, cross-cutting prompts → SAI hoàn toàn.',
   tip:'🔑 Từ cực đoan thường làm SAI đáp án: "inevitably" (B), "exclusively" (D), "has waned/entirely/solely" → gần như luôn sai trong bài đọc hiểu. Đáp án đúng dùng ngôn ngữ trung tính, phản ánh trực tiếp câu văn gốc.'},
  {num:18,type:'Paragraph identification',
   q:'Which paragraph mentions mechanisms that attempt to curb misinformation while introducing questions about authority?',
   opts:['A. Paragraph 1','B. Paragraph 2','C. Paragraph 3','D. Paragraph 4'],
   ans:'C',
   explain:'Đoạn văn được trích dẫn (bắt đầu "During election cycles and public-health crises, these dynamics become more combustible...") chứa: (1) Các cơ chế chống thông tin sai: "labeling disputed content, down-ranking coordinated manipulation, and boosting authoritative outlets" và (2) Câu hỏi về tính hợp pháp: "they also raise normative questions about legitimacy and transparency." || Dựa vào câu hỏi số 15 đã xác nhận: từ "combustible" = paragraph 3. Đây chính là đoạn 3.',
   tip:'🔑 Chiến thuật cross-referencing: Dùng thông tin từ CÂU HỎI KHÁC trong cùng bộ đề. Câu 15 đã xác định "combustible" ở paragraph 3 → câu hỏi 18 cũng hỏi về đoạn chứa "combustible" → đáp án C. Tiết kiệm thời gian đọc lại toàn bài.'},
  {num:19,type:'Paragraph identification',
   q:'Which paragraph mentions the argument that personalization\'s isolating effects are often exaggerated relative to offline habits?',
   opts:['A. Paragraph 4','B. Paragraph 3','C. Paragraph 2','D. Paragraph 1'],
   ans:'D',
   explain:'Đoạn văn được trích dẫn (bắt đầu "The phrase \'filter bubble\' has become a rhetorical catch-all for the anxieties attending personalized media...") chứa câu cốt lõi: "The specter of informational isolation, though not imaginary, is often overstated when compared with offline routines such as selective friendship networks or partisan news habits." → Đây là Paragraph 1 (đoạn đầu tiên giới thiệu khái niệm "filter bubble" và đặt câu hỏi). Đoạn mở bài thường giới thiệu khái niệm trung tâm và nêu luận điểm phản biện.',
   tip:'🔑 Nhận diện Paragraph 1 qua: "filter bubble" (khái niệm được giới thiệu), "overstated" (phản biện ngay từ đầu), "offline routines" (so sánh). Đoạn mở bài thường đặt vấn đề và nêu luận điểm ngược chiều để tạo sức căng cho toàn bài.'},
  {num:24,type:'Vocabulary',
   q:'The contest attracted over 180 photographers and 445 eligible submissions – a (24) ______ increase compared to the previous year.',
   opts:['A. marginal','B. negligible','C. substantial','D. moderate'],
   ans:'C',
   explain:'A "marginal": nhỏ, không đáng kể, chỉ ở mức tối thiểu. Đồng nghĩa: minimal, slight, minor. Ví dụ: tăng 0.5%. || B "negligible": không đáng kể, có thể bỏ qua (quá nhỏ). Đồng nghĩa: trivial, insignificant. Ví dụ: tăng 0.01%. || C "substantial": lớn, đáng kể, quan trọng. Đồng nghĩa: considerable, significant, sizable, ample. Ví dụ: tăng 50%. || D "moderate": vừa phải, ở mức trung bình. Đồng nghĩa: average, medium, modest. Ví dụ: tăng 10–15%. || Con số 180+ nhiếp ảnh gia và 445 bài dự thi là ấn tượng → substantial. "Moderate" (D) cũng dùng được nhưng không nhấn mạnh được mức độ đáng kể của sự kiện.',
   tip:'🔑 Thang mức độ từ nhỏ đến lớn: negligible → marginal → moderate → substantial → enormous/dramatic. Khi đề cập số lượng lớn, ấn tượng → substantial/considerable/significant. Trái nghĩa của substantial: negligible, insignificant, paltry, trivial.'},
  {num:27,type:'Word form',
   q:'Its unique design has earned it global ______ as one of the world\'s most striking pedestrian bridges.',
   opts:['A. recognize','B. recognizable','C. recognition','D. recognizably'],
   ans:'C',
   explain:'Phân tích cấu trúc: "earned it [global ______]" → "earned sb sth" = mang lại cho ai điều gì → tân ngữ trực tiếp (sth) phải là DANH TỪ. "global" là tính từ bổ nghĩa cho danh từ đó. || A "recognize": động từ → ❌. B "recognizable": tính từ → ❌. D "recognizably": trạng từ → ❌. C "recognition" /ˌrekəɡˈnɪʃn/: danh từ = sự công nhận, sự nổi tiếng → ✓. || Ví dụ tương tự: The invention earned him global recognition / fame / respect / praise.',
   tip:'🔑 Cách nhớ họ từ "recognize": recognize (v) → recognition (n) → recognizable (adj) → recognizably (adv). "earn sb + danh từ": earn sb fame / recognition / respect / praise / a reputation / a place in history.'},
  {num:'31b',type:'Inference',
   q:'According to paragraph 1 (techno-feudalism), the author suggests that the term "techno-feudalism" can ______.',
   opts:['A. yield policy remedies precisely because it avoids structural inquiry','B. blur analytical rigor by substituting moral denunciation for explanation','C. demonstrate that platforms now operate outside capitalist dynamics','D. neutralize public outrage by reframing platforms as benign intermediaries'],
   ans:'B',
   explain:'Câu văn gốc: "Yet the metaphor does more than describe; it prescribes a politics of denunciation that risks confusing moral outrage with structural analysis." || B: "blur analytical rigor by substituting moral denunciation for explanation" = làm mờ tính chặt chẽ phân tích bằng cách thay thế giải thích bằng sự lên án đạo đức → Đây chính là ý tác giả viết. ✓ || A: "yield policy remedies... avoids structural inquiry" → Sai, trái ngược hoàn toàn: chính vì né tránh phân tích cấu trúc nên KHÔNG cho ra giải pháp chính sách tốt. || C: "platforms operate outside capitalist dynamics" → Sai, tác giả nói "may, on closer inspection, be capitalism with novel instruments." || D: "neutralize public outrage... benign intermediaries" → Sai, không có cơ sở trong đoạn.',
   tip:'🔑 Suy luận từ bài: Luôn tìm câu văn gốc chứa ý tương ứng. Ở đây: "confusing moral outrage with structural analysis" → B "substituting moral denunciation for explanation". Hai cách diễn đạt khác nhau nhưng cùng một ý.'},
  {num:35,type:'Inference',
   q:'Which of the following is implied about antitrust in the text (techno-feudalism passage)?',
   opts:['A. It is sufficient when paired with sectoral price caps and wage boards.','B. It is necessary but inadequate without confronting infrastructural control.','C. It is largely symbolic and should be abandoned in digital markets.','D. It invariably fragments platforms and restores pre-platform competition.'],
   ans:'B',
   explain:'Câu văn gốc: "If the latter, then antitrust alone cannot suffice; regulation must reckon with infrastructural power, from cloud stacks to payments rails." || "antitrust alone cannot suffice" → antitrust không đủ khi dùng một mình. || "regulation must reckon with infrastructural power" → cần đối đầu với sức mạnh hạ tầng. || Kết hợp: antitrust cần thiết (được nhắc đến như công cụ hiện hữu) nhưng không đủ → Đây chính là B. || A: "sufficient when paired with price caps and wage boards" → không có cơ sở, bài không đề cập. C: "largely symbolic, should be abandoned" → Sai, bài không nói vậy. D: "invariably fragments platforms" → Sai, không có cơ sở.',
   tip:'🔑 "alone cannot suffice" = cần nhưng không đủ (necessary but not sufficient). "must reckon with" = phải đối đầu, phải tính đến. Ghép hai ý lại → B là kết luận chính xác từ văn bản.'},
  {num:37,type:'Paraphrase',
   q:'Paraphrase: "To call these actors mere rentiers is to ignore how their laboratories of optimization also reorganize labor, time, and attention across entire sectors."',
   opts:['A. Labeling platforms as pure rent collectors overlooks the transformative effects of their R&D on sectoral rhythms, masking the productive dimensions that intensify capitalism\'s reach.','B. Calling platforms rent-seekers acknowledges how their optimization eclipses production, proving contemporary firms cannot influence schedules or industries substantially.','C. Describing platform owners as rentiers highlights that innovation labs have negligible effects on labor processes and should not be a policy focus.','D. Branding platforms as rentiers precisely captures their contribution to efficiency because research facilities primarily defend static market shares rather than engineer change.'],
   ans:'A',
   explain:'Nghĩa câu gốc: Gọi các chủ thể này chỉ là "kẻ ăn bám" (rentier) là bỏ qua việc các phòng thí nghiệm tối ưu hóa của họ cũng TÁI TỔ CHỨC lao động, thời gian và sự chú ý trên toàn bộ ngành → Họ không chỉ hút lợi nhuận thụ động mà còn có tác động sản xuất, cải tổ xã hội. || A: "overlooks the transformative effects of their R&D on sectoral rhythms, masking productive dimensions" = bỏ qua tác động chuyển đổi → ✓ Sát nghĩa nhất. || B: "proving contemporary firms cannot influence schedules or industries substantially" → Ngược nghĩa: câu gốc nói họ CÓ ảnh hưởng lớn. || C: "innovation labs have negligible effects" → Ngược nghĩa: câu gốc nói tác động là đáng kể và bị bỏ qua. || D: "precisely captures their contribution" → Ngược nghĩa: câu gốc PHÊ PHÁN việc gán mác đó là không chính xác.',
   tip:'🔑 Paraphrase đúng = đổi cấu trúc + giữ nguyên ý + KHÔNG đảo ngược sắc thái. Ba đáp án B,C,D đều ĐẢO NGƯỢC nghĩa của câu gốc. Chỉ A giữ đúng: "gán mác sai → bỏ qua tác động thực".'},
  {num:'38a',type:'Inference',
   q:'Which of the following can be reasonably inferred from paragraph 3 (geopolitical / techno-feudalism)?',
   opts:['A. As states instrumentalize platforms, the line between market and command increasingly dissolves, generating a composite regime where accountability becomes a central design problem.','B. Government reliance on platforms for strategic aims will soon eliminate private discretion, reverting the economy to pre-capitalist formations with hereditary privilege.','C. National security imperatives have insulated platforms from coordinating with market actors, causing efficiency losses likely to end platform predominance.','D. Because states conscript platforms, corporate power can no longer be contested through legislative means and must be confronted solely via consumer boycotts.'],
   ans:'A',
   explain:'Các luận điểm trong đoạn 3: (1) "blurring the boundary between corporate prerogative and sovereign design" = ranh giới công-tư mờ nhòa. (2) "The result is not neo-feudal fragmentation but multiplex capitalism, in which public and private apparatuses interlock" = chế độ hỗn hợp. (3) "the central question is less whether markets survive than who programs them, to whose advantage, and with what forms of accountability" = trách nhiệm giải trình là vấn đề trung tâm. || A: Tổng hợp đúng cả 3 ý → ✓. || B: "reverting to pre-capitalist formations with hereditary privilege" → Sai, bài nói "not neo-feudal". || C: "insulated platforms from coordinating with market actors" → Sai, bài nói interlock (đan xen), không phải insulate (cách ly). || D: "solely via consumer boycotts" → Sai, không được đề cập.',
   tip:'🔑 "multiplex capitalism" = chế độ PHỨC HỢP công-tư (không phải neo-feudal). "interlock" = đan xen, gắn kết (không phải cách ly hay thống trị một chiều). Câu kết của đoạn về accountability = manh mối suy luận cho A.'},
  {num:11,type:'Preposition phrase',
   q:'Microsoft\'s newly enhanced Copilot for Windows represents a major breakthrough ______ intelligent productivity.',
   opts:['A. in the face of','B. in the light of','C. in the realm of','D. in the prime of'],
   ans:'C',
   explain:'A "in the face of": đối mặt với, mặc dù (khó khăn, nguy hiểm). Đồng nghĩa: despite, in spite of, when confronted with. Ví dụ: "They succeeded in the face of great adversity." || B "in the light of": xét theo, căn cứ vào, dựa trên (thông tin mới). Đồng nghĩa: considering, given, taking into account. Ví dụ: "In the light of recent events, we changed our plan." || C "in the realm of": trong lĩnh vực (của). Đồng nghĩa: in the field of, in the domain of, in the area of, within the scope of. Ví dụ: "a breakthrough in the realm of artificial intelligence." ✓ || D "in the prime of": trong thời kỳ đỉnh cao (thường nói về tuổi trẻ, sức khỏe, sự nghiệp). Đồng nghĩa: at the peak of, in the heyday of. Ví dụ: "He died in the prime of his life."',
   tip:'🔑 "a breakthrough in the realm of [lĩnh vực]" = cụm cố định trong văn viết học thuật và báo chí. Bộ tứ giới từ cần nhớ: realm/field/domain/sphere of (lĩnh vực) | face of (đối mặt) | light of (xét theo) | prime of (đỉnh cao).'},
  {num:13,type:'Preposition',
   q:'Copilot can now connect ______ both Outlook and Gmail, intelligently retrieving data from emails and contact lists.',
   opts:['A. by','B. at','C. with','D. to'],
   ans:'D',
   explain:'"connect to" là giới từ chuẩn khi nói về thiết bị hoặc phần mềm kết nối ĐẾN một dịch vụ/hệ thống bên ngoài. Ví dụ: connect to Wi-Fi / connect to a server / connect to a database / connect to Outlook. || "connect with" thường dùng khi nói về kết nối giữa người với người hoặc sự tương tác hai chiều mang tính cảm xúc/xã hội. Ví dụ: connect with friends / connect with the audience / connect with customers. || "by" và "at" không dùng với "connect" trong ngữ cảnh này.',
   tip:'🔑 connect TO + dịch vụ/thiết bị/hệ thống (Wi-Fi, server, Outlook, Gmail, printer, database) → mang tính kỹ thuật, một chiều. connect WITH + người/đối tượng xã hội → mang tính tương tác, hai chiều. Đây là lỗi giới từ cực kỳ phổ biến trong đề thi.'},
  {num:14,type:'Phrasal verb',
   q:'Users can request it to ______ invoices issued by a particular company or display a contact\'s recent correspondence.',
   opts:['A. turn up','B. look up','C. set up','D. bring up'],
   ans:'B',
   explain:'A "turn up": (1) xuất hiện bất ngờ (She turned up late); (2) tăng âm lượng/nhiệt độ (turn up the volume); (3) tìm thấy/để lộ ra (The search turned up new evidence) → Không phải hành động chủ động tra cứu theo yêu cầu. || B "look up": tra cứu, tìm kiếm thông tin (trong từ điển, cơ sở dữ liệu, danh sách). Đồng nghĩa: search for, retrieve, query, find. → ✓ Phù hợp nhất: người dùng yêu cầu tra cứu hóa đơn. || C "set up": thiết lập, cài đặt, sắp xếp → Không liên quan đến tra cứu thông tin. || D "bring up": (1) đề cập (bring up a topic); (2) nuôi dưỡng (brought up children); (3) làm xuất hiện trên màn hình (bring up a window) → Nghĩa 3 gần nhưng "look up" chuẩn hơn cho tra cứu dữ liệu có cấu trúc.',
   tip:'🔑 look up = tra cứu thông tin (từ điển, database, danh bạ) | set up = thiết lập/cài đặt | bring up = đề cập/hiển thị | turn up = xuất hiện/tăng. Đây là dạng câu phrasal verb đặc trưng của đề THPTQG – cần học nghĩa từng cụm.'},
  {num:'24b',type:'Vocabulary',
   q:'The word "fungible" in paragraph 2 (living shoreline) mostly means ______.',
   opts:['A. interchangeable and tradable with equivalent units in a market context','B. uniquely valuable and irreplaceable, similar to rare ecological species','C. inherently unstable and prone to unpredictable fluctuations','D. limited to short-term pilot schemes without scalability'],
   ans:'A',
   explain:'"fungible" (adj): có thể hoán đổi; các đơn vị có giá trị như nhau, có thể trao đổi hoặc thay thế cho nhau trong giao dịch. || Trong đoạn văn: "Each credit – representing one metric ton of carbon dioxide – may be traded or retired, creating a fungible asset class linked to ecosystem resilience." Mỗi tín chỉ = 1 tấn CO₂, bình đẳng và có thể giao dịch → "fungible" rõ ràng mang nghĩa A. || B "uniquely valuable and irreplaceable" = trái nghĩa hoàn toàn → ❌. C "inherently unstable" = không ổn định → ❌. D "limited to short-term pilot schemes" = không liên quan → ❌.',
   tip:'🔑 "fungible" là thuật ngữ tài chính-pháp lý: tiền mặt, cổ phiếu phổ thông, tín chỉ carbon, vàng đều là "fungible" (1 đơn vị = 1 đơn vị khác). Trái nghĩa nổi tiếng: NFT = Non-Fungible Token (mỗi token là duy nhất, không hoán đổi được). Đây là từ vựng thuộc chủ đề kinh tế-môi trường.'},
  {num:'25d',type:'Summary',
   q:'Which of the following best summarises paragraph 2 (living shoreline / carbon credits)?',
   opts:['A. The living shoreline secures both climate mitigation and biodiversity by preventing marsh drowning, while simultaneously serving as a carbon-credit-generating mechanism.','B. The project\'s construction costs remain unrecoverable because carbon credits are insufficiently valuable to offset investment.','C. The protocol guarantees biodiversity but excludes any contribution to climate mitigation since only financial trading is emphasised.','D. Seawall construction is highlighted as more reliable than living shorelines for balancing economic and ecological objectives.'],
   ans:'A',
   explain:'Đoạn 2 có 4 ý chính: (1) Chi phí xây dựng được hoàn trả qua tín chỉ carbon → tạo tài sản có thể hoán đổi. (2) Bờ sống duy trì thảm thực vật, ổn định trầm tích → ngăn phát thải carbon và tăng hấp thụ. (3) Không có can thiệp → đất ngập nước chìm → mất đa dạng sinh học + giải phóng khí nhà kính. (4) Kết luận: bờ sống vừa là giải pháp kỹ thuật, vừa là công cụ thị trường carbon. || A tóm đủ cả 4 ý chính → ✓. || B "costs remain unrecoverable" → Sai, bài nói "will be reimbursed". || C "excludes any contribution to climate mitigation" → Sai, bài nêu rõ cả hai mục tiêu. || D "seawall construction is more reliable" → Sai, tường biển không được nhắc đến trong đoạn này.',
   tip:'🔑 Tóm tắt đoạn cần bao hàm ĐỦ ý chính và KHÔNG sai lệch sắc thái. Loại đáp án dùng từ tuyệt đối không có trong bài: "unrecoverable", "excludes any", "more reliable than". Đây là kỹ năng đọc hiểu cốt lõi.'},
  {num:'27b',type:'Inference',
   q:'Based on the passage, how does the Virginia Point shoreline serve as evidence for scaling up similar projects?',
   opts:['A. It proved that traditional seawalls could outperform ecological structures in resisting erosion.','B. It demonstrated ecological recovery through the re-emergence of sensitive avian species and habitat resilience.','C. It highlighted the financial risks of commodification when credits failed to generate returns.','D. It exposed the fragility of marshland ecosystems by accelerating their drowning process.'],
   ans:'B',
   explain:'Câu văn gốc: "Scenic Galveston\'s earlier shoreline at Virginia Point already demonstrated measurable ecological recovery, including the return of rare avian species." → Bằng chứng thực tế: (1) Phục hồi sinh thái có thể đo lường được (measurable ecological recovery). (2) Sự trở lại của các loài chim quý hiếm (rare avian species). → B diễn đạt chính xác cả hai điểm. || A "seawalls outperform ecological structures" → Sai, bài so sánh ngược lại (living shorelines tốt hơn seawalls). || C "financial risks when credits failed" → Sai, không liên quan đến Virginia Point. || D "exposed fragility by accelerating drowning" → Hoàn toàn ngược nghĩa (bài nói VPt cho thấy PHỤC HỒI, không phải suy thoái).',
   tip:'🔑 "Evidence for scaling up" = bằng chứng dự án nhỏ đã thành công, có thể nhân rộng. Tìm câu văn gốc về Virginia Point và đối chiếu. Từ khóa: "measurable ecological recovery", "return of rare avian species" → B.'},
  {num:'31c',type:'Sentence insertion',
   q:'Where in the passage (living shoreline) would this sentence best fit? "Such an approach, while novel, inevitably raises the question of whether pricing nature risks reducing it to mere commodity status."',
   opts:['A. [I] – sau câu đầu đoạn 1','B. [II] – giữa đoạn 1','C. [III] – trước câu "Yet critics warn that commodifying..."','D. [IV] – giữa đoạn 3 (chức năng bờ sống)'],
   ans:'C',
   explain:'"Such an approach" là anaphoric reference (đại từ chỉ ngược) → phải có "approach" được đề cập TRƯỚC ĐÓ. Phương pháp gán giá trị tài chính cho thiên nhiên (blue carbon approach) đã được giới thiệu ở đoạn 1. || Tại [III]: Đặt câu này trước "Yet critics warn that commodifying marshlands risks subordinating ecological value to speculative trading..." tạo cầu nối hoàn hảo: câu chèn đặt câu hỏi → "Yet critics warn" trả lời câu hỏi đó. || [I]: Đầu đoạn 1 – chưa đề cập đến "pricing nature" → "such an approach" không có referent. || [II]: Giữa đoạn 1 – đang mô tả dự án, chưa thích hợp để đặt câu hỏi phê phán. || [IV]: Đoạn 3 (chức năng bờ sống + Virginia Point) – không liên quan đến hàng hóa hóa thiên nhiên.',
   tip:'🔑 Hai bước chèn câu: (1) Tìm referent của "such an approach" ở câu trước (approach đã được đề cập). (2) "inevitably raises the question" phải dẫn vào câu TIẾP THEO là phê phán/trả lời câu hỏi đó. Chỉ [III] thỏa mãn cả hai điều kiện.'},
  {num:33,type:'Vocabulary',
   q:'The word "instrumentalize" in paragraph 1 (corporate ethics) is closest in meaning to ______.',

let state = {
  page: 'home',
  topicId: null,
  subtopic: null, // 'words'|'phrasal'|'idioms'
  studyMode: null, // 'flashcard'|'quiz'|'match'
  advTopicId: null,
  fcIndex: 0, fcFlipped: false,
  qIndex: 0, qAnswered: false, qScore: 0,
  qDone: false,
  matchLeft: null, matchPaired: {},
  mkIndex: 0, mkAnswered: false, mkScore: 0, mkDone: false,
  gramOpen: {},
  quoteIndex: Math.floor(Math.random()*QUOTES.length),
  filterTag: 'all',
};

function getQuote(){
  const q = QUOTES[state.quoteIndex % QUOTES.length];
  state.quoteIndex++;
  return q;
}
function quoteFooter(){return `<div class="quote-footer"><div class="quote-text">${getQuote()}</div></div>`;}

// ═══════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════
function navigate(page, params={}){
  state.page = page;
  Object.assign(state, params);
  // Reset study state
  state.fcIndex=0; state.fcFlipped=false;
  state.qIndex=0; state.qAnswered=false; state.qScore=0; state.qDone=false;
  state.matchLeft=null; state.matchPaired={};
  state.mkIndex=0; state.mkAnswered=false; state.mkScore=0; state.mkDone=false;
  render();
}
function setNavActive(id){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const el = document.getElementById('nav-'+id);
  if(el) el.classList.add('active');
}

//  RENDER
// ═══════════════════════════════════════════
function render(){
  const topbarTitle = document.getElementById('topbar-title');
  const breadcrumb = document.getElementById('breadcrumb');
  const page = document.getElementById('page');
  
  let html='', title='', bc='';
  
  if(state.page==='home'){
    setNavActive('home');
    title='Trang chủ'; bc='';
    html=renderHome();
  } else if(state.page==='vocab'){
    setNavActive('vocab');
    title='Từ vựng theo chủ đề'; bc='Học liệu › Từ vựng';
    html=renderVocabList();
  } else if(state.page==='vocab-topic'){
    setNavActive('vocab');
    const t=VOCAB_TOPICS.find(t=>t.id===state.topicId);
    title=t?t.name:''; bc=`Từ vựng › ${t?t.name:''}`;
    html=renderVocabTopic(t);
  } else if(state.page==='vocab-study'){
    setNavActive('vocab');
    const t=VOCAB_TOPICS.find(t=>t.id===state.topicId);
    title=`${t?t.name:''} – ${state.studyMode}`; bc=`Từ vựng › ${t?t.name:''} › ${state.studyMode}`;
    html=renderStudy(t,state.subtopic,state.studyMode);
  } else if(state.page==='phrasal'){
    setNavActive('phrasal');
    title='Phrasal Verbs'; bc='Học liệu › Phrasal Verbs';
    html=renderPhrasalAll();
  } else if(state.page==='idioms'){
    setNavActive('idioms');
    title='Idioms'; bc='Học liệu › Idioms';
    html=renderIdiomsAll();
  } else if(state.page==='advanced'){
    setNavActive('advanced');
    title='Từ vựng nâng cao'; bc='Học liệu › Từ vựng nâng cao';
    html=renderAdvancedList();
  } else if(state.page==='adv-topic'){
    setNavActive('advanced');
    const t=ADVANCED_TOPICS.find(t=>t.id===state.advTopicId);
    title=t?t.name:''; bc=`Nâng cao › ${t?t.name:''}`;
    html=renderAdvancedTopic(t);
  } else if(state.page==='adv-study'){
    setNavActive('advanced');
    const t=ADVANCED_TOPICS.find(t=>t.id===state.advTopicId);
    title=`${t?t.name:''} – ${state.studyMode}`; bc=`Nâng cao › ${t?t.name:''}`;
    html=renderStudy(t,'words',state.studyMode);
  } else if(state.page==='grammar'){
    setNavActive('grammar');
    title='Ngữ pháp THPTQG'; bc='Luyện tập › Ngữ pháp';
    html=renderGrammar();
  } else if(state.page==='mistakes'){
    setNavActive('mistakes');
    title='Luyện lỗi sai'; bc='Luyện tập › Lỗi sai';
    html=renderMistakes();
  } else if(state.page==='mistakes-practice'){
    setNavActive('mistakes');
    title='Luyện tập – Lỗi sai'; bc='Luyện tập › Lỗi sai › Thực hành';
    html=renderMistakesPractice();
  }
  
  topbarTitle.textContent=title;
  breadcrumb.innerHTML=bc?`<span>${bc}</span>`:'';
  page.innerHTML=`<div class="fade-in">${html}</div>`;
  page.scrollTop=0;
}

function switchTab(name, el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('content-words').style.display='none';
  document.getElementById('content-phrasal').style.display='none';
  document.getElementById('content-idioms').style.display='none';
  document.getElementById('content-'+name).style.display='block';
}

//  STUDY MODES
// ═══════════════════════════════════════════
function getItems(t, subtopic){
  if(!t) return [];
  if(subtopic==='words' || subtopic===undefined) return t.words||[];
  if(subtopic==='phrasal') return t.phrasal||[];
  if(subtopic==='idioms') return t.idioms||[];
  return t.words||[];
}

function renderStudy(t, subtopic, mode){
  if(!t) return '<p>Không tìm thấy.</p>';
  const isAdv = !!state.advTopicId;
  const backPage = isAdv ? 'adv-topic' : 'vocab-topic';
  const backParam = isAdv ? {advTopicId:state.advTopicId} : {topicId:state.topicId};
  const backLabel = isAdv ? '← Quay lại chủ đề' : '← Quay lại chủ đề';
  
  let modeHTML='';
  if(mode==='flashcard') modeHTML=renderFlashcard(t,subtopic);
  else if(mode==='quiz') modeHTML=renderQuiz(t,subtopic);
  else if(mode==='match') modeHTML=renderMatch(t,subtopic);
  
  return `
<button class="back-btn" onclick="navigate('${backPage}',${JSON.stringify(backParam)})">${backLabel}</button>
<div class="section-hdr"><h3>${t.emoji||'📖'} ${t.name} – ${mode==='flashcard'?'Flashcard':mode==='quiz'?'Quiz':'Ghép cặp'}</h3></div>
<div class="mode-bar">

  <button class="btn ${mode==='quiz'?'btn-gold':'btn-outline'} btn-sm" onclick="navigate('${isAdv?'adv-study':'vocab-study'}',{${isAdv?'advTopicId':'topicId'}:'${isAdv?state.advTopicId:state.topicId}',subtopic:'${subtopic||'words'}',studyMode:'quiz'})">📝 Quiz</button>

function renderFlashcard(t, subtopic){
  const items = getItems(t, subtopic);
  if(!items.length) return '<p>Không có dữ liệu.</p>';
  const i = state.fcIndex % items.length;
  const item = items[i];
  const isWord = subtopic==='words'||!subtopic;
  const isPV = subtopic==='phrasal';
  
  let front='', back='';
  if(isWord){
    front=`<div class="fc-word">${item.w}</div><div class="fc-pron">${item.pr||''}</div><div class="fc-type">${item.type||''}</div><button class="fc-speak" onclick="event.stopPropagation();speak('${(item.w||'').replace(/'/g,"\\'")}',this)">🔊 Nghe phát âm</button>`;
    back=`<div class="fc-meaning">${item.vi}</div><div class="fc-example">${item.ex||''}</div>`;
  } else if(isPV){
    front=`<div class="fc-word" style="font-size:24px">${item.pv}</div><button class="fc-speak" onclick="event.stopPropagation();speak('${(item.pv||'').replace(/'/g,"\\'")}',this)">🔊 Nghe phát âm</button>`;
    back=`<div class="fc-meaning">${item.vi}</div><div class="fc-example">${item.ex||''}</div>`;
  } else {
    front=`<div class="fc-word" style="font-size:20px">${item.id}</div><button class="fc-speak" onclick="event.stopPropagation();speak('${(item.id||'').replace(/'/g,"\\'")}',this)">🔊 Nghe phát âm</button>`;
    back=`<div class="fc-meaning">${item.vi}</div><div class="fc-example">${item.ex||''}</div>`;
  }
  
  return `<div class="study-wrap">
    <div class="flashcard-wrap">
      <div class="flashcard${state.fcFlipped?' flipped':''}" id="fc" onclick="fcFlip()">
        <div class="fc-face fc-front">${front}</div>
        <div class="fc-face fc-back">${back}</div>
      </div>
      <div class="fc-nav">
        <button class="btn btn-outline btn-sm" onclick="fcPrev()">← Trước</button>
        <span class="fc-counter">${i+1} / ${items.length}</span>
        <button class="btn btn-gold btn-sm" onclick="fcNext()">Tiếp →</button>
